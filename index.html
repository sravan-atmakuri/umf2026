<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;--surface:#10101c;--surface2:#18182a;--border:#1e1e35;
  --text:#eeeeff;--muted:#6666aa;
  --accent:#c94aff;--accent2:#00d4ff;
  --main:#ff3355;--worldwide:#4361ee;--mega:#aa00ff;
  --hekate:#ff1f72;--live:#00c8ff;--radio:#ff8800;--oasis:#00e699;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}

/* ── HEADER ── */
header{
  background:linear-gradient(135deg,#07070f 0%,#150830 50%,#07070f 100%);
  border-bottom:1px solid #2a1050;
  padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
}
.logo-block{}
.logo{font-size:1.35rem;font-weight:900;letter-spacing:3px;text-transform:uppercase;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:.7rem;color:var(--muted);letter-spacing:2px;margin-top:2px;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:10px}
.alert-mins{
  background:var(--surface2);border:1px solid #2a1050;color:var(--muted);
  padding:6px 10px;border-radius:8px;font-size:.75rem;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:.2s
}
.alert-mins select{background:transparent;border:none;color:var(--muted);font-size:.75rem;cursor:pointer;outline:none}
.notif-btn{
  background:var(--surface2);border:1px solid #2a1050;color:var(--muted);
  padding:8px 14px;border-radius:20px;cursor:pointer;font-size:.82rem;
  font-weight:600;transition:.2s;white-space:nowrap
}
.notif-btn:hover{border-color:var(--accent);color:var(--text)}
.notif-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(201,74,255,.1)}

/* ── DAY TABS ── */
.day-tabs{background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 20px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{
  padding:13px 20px;cursor:pointer;font-size:.85rem;font-weight:700;
  color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;
  transition:.2s;letter-spacing:.5px;text-transform:uppercase
}
.day-tab:hover{color:var(--text)}
.day-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.day-tab.fav-tab.active{color:#ffd700;border-bottom-color:#ffd700}

/* ── STAGE FILTERS ── */
.stage-bar{
  padding:10px 20px;display:flex;gap:7px;overflow-x:auto;
  background:var(--bg);border-bottom:1px solid var(--border);scrollbar-width:none
}
.stage-bar::-webkit-scrollbar{display:none}
.s-chip{
  padding:5px 13px;border-radius:20px;font-size:.72rem;font-weight:700;
  cursor:pointer;border:1.5px solid #252540;color:var(--muted);
  white-space:nowrap;transition:.2s;letter-spacing:.5px;text-transform:uppercase;
  user-select:none
}
.s-chip:hover{border-color:#454570;color:var(--text)}

/* ── MAIN CONTENT ── */
.content{padding:18px 20px;max-width:960px;margin:0 auto}

/* ── NOW PLAYING BANNER ── */
.now-banner{
  background:linear-gradient(90deg,rgba(0,230,153,.12),rgba(0,230,153,.04));
  border:1px solid rgba(0,230,153,.25);border-radius:10px;
  padding:10px 16px;margin-bottom:18px;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.live-dot{width:8px;height:8px;background:#00e699;border-radius:50%;flex-shrink:0;
  animation:pulse 1.5s ease-in-out infinite}
.live-tag{color:#00e699;font-weight:800;font-size:.72rem;letter-spacing:1px}

/* ── STAGE SECTION HEADERS ── */
.stage-header{
  grid-column:1/-1;
  display:flex;align-items:center;gap:10px;
  padding:6px 0 4px;margin-top:8px;
}
.stage-header-line{flex:1;height:1px;background:var(--border)}
.stage-header-text{font-size:.72rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase}

/* ── GRID ── */
.set-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:11px}

/* ── SET CARD ── */
.set-card{
  background:var(--surface);border-radius:12px;padding:14px 16px;
  border:1px solid var(--border);
  border-left:3px solid var(--sc);
  transition:transform .15s,box-shadow .15s,border-color .15s,background .15s;
  position:relative;
  cursor:pointer;
  -webkit-tap-highlight-color:rgba(201,74,255,.15);
  user-select:none;
}
.set-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.5);border-color:var(--sc)}
.set-card:active{transform:scale(.97);background:var(--surface2)}
.set-card.now{background:linear-gradient(135deg,var(--surface),rgba(0,230,153,.06))}
.set-card.past{opacity:.38;pointer-events:none}
.set-card.faved{border-color:var(--sc);background:color-mix(in srgb,var(--surface) 88%,var(--sc) 12%)}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.artist{font-size:.97rem;font-weight:700;line-height:1.3;flex:1}
.fav-btn{
  background:none;border:none;cursor:pointer;
  font-size:1.4rem;line-height:1;
  opacity:.55;transition:.2s;
  padding:2px 4px;flex-shrink:0;
  border-radius:6px;
}
.fav-btn:hover{opacity:.9;background:rgba(255,255,255,.08)}
.fav-btn.on{opacity:1;filter:drop-shadow(0 0 6px gold)}

.card-mid{margin-top:9px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.stage-pill{
  font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;
  padding:3px 8px;border-radius:10px;background:rgba(255,255,255,.06);color:var(--sc);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px
}
.set-time{font-size:.98rem;font-weight:800;color:var(--sc);flex-shrink:0}

.card-bottom{
  margin-top:10px;padding-top:10px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;font-size:.8rem;min-height:26px
}
.cd-label{color:var(--muted)}
.cd-val{font-weight:700;font-variant-numeric:tabular-nums}
.cd-val.soon{color:#ff9933}
.cd-val.urgent{color:#ff4444;animation:pulse 1s ease-in-out infinite}
.cd-val.live{color:#00e699;font-weight:800}
.cd-val.ended{color:var(--muted)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .icon{font-size:3rem;margin-bottom:12px;display:block}
.empty p{font-size:.95rem}

/* ── TIMELINE (My Schedule) ── */
.set-grid.tl-mode{display:block}
.tl-empty{text-align:center;padding:60px 20px;color:var(--muted)}
.tl-empty .icon{font-size:2.5rem;display:block;margin-bottom:10px}
.tl-section{margin-bottom:30px}
.tl-day-hdr{
  font-size:.72rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);display:flex;align-items:center;gap:8px;margin-bottom:12px
}
.tl-day-hdr::after{content:'';flex:1;height:1px;background:var(--border)}
.tl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px}
.tl-inner{min-width:660px;padding-right:8px}
.tl-ruler{display:flex;margin-left:78px;margin-bottom:2px}
.tl-tick{
  flex:1;font-size:.58rem;color:var(--muted);letter-spacing:-.2px;
  border-left:1px solid #1e1e35;padding:0 0 4px 3px;line-height:1
}
.tl-row{display:flex;align-items:center;margin-bottom:6px;min-height:34px}
.tl-lbl{
  width:78px;flex-shrink:0;font-size:.62rem;color:var(--muted);
  font-weight:600;padding-right:8px;text-align:right;line-height:1.35
}
.tl-bars{
  flex:1;position:relative;height:30px;
  background:rgba(255,255,255,.025);border-radius:4px;
  border-left:1px solid #1e1e35;
}
.tl-bar{
  position:absolute;top:2px;height:26px;border-radius:6px;
  display:flex;align-items:center;padding:0 7px;
  font-size:.63rem;font-weight:700;color:#fff;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  box-shadow:0 2px 8px rgba(0,0,0,.45);
  cursor:pointer;transition:.15s;
  -webkit-tap-highlight-color:rgba(255,255,255,.15);
}
.tl-bar:hover{filter:brightness(1.15);transform:scaleY(1.07)}
.tl-bar:active{filter:brightness(.85)}
.tl-bar.clash{box-shadow:0 0 0 2px #ff4444,0 2px 8px rgba(0,0,0,.4);z-index:2}
.tl-grid-lines{
  position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;
  display:flex;
}
.tl-grid-line{flex:1;border-left:1px solid rgba(255,255,255,.04)}
/* Clash warnings */
.clash-box{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.clash-item{
  background:rgba(255,68,68,.07);border:1px solid rgba(255,68,68,.25);
  border-radius:8px;padding:8px 12px;font-size:.78rem;
  display:flex;align-items:flex-start;gap:8px;line-height:1.4
}
.clash-icon{font-size:1rem;flex-shrink:0;margin-top:1px}
.tl-hint{
  font-size:.68rem;color:var(--muted);text-align:center;
  margin-top:-4px;margin-bottom:16px;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#252540;border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:#353560}

@media(max-width:480px){
  header{padding:12px 14px}.logo{font-size:1.1rem}
  .content{padding:14px}
}

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function getSetDate(s){
  return new Date(`${DAYS[s.day]}T${s.time}:00`);
}

function getStageName(stageId, day){
  if(STAGE_DAY_NAMES[stageId]) return STAGE_DAY_NAMES[stageId][day] || getStage(stageId).name;
  return getStage(stageId).name;
}

function getStage(id){ return STAGES.find(s=>s.id===id); }

function fmt12(t){
  const [h,m]=t.split(':').map(Number);
  const ap=h>=12?'PM':'AM';
  const h12=h>12?h-12:(h===0?12:h);
  return `${h12}:${m.toString().padStart(2,'0')} ${ap}`;
}

function fmtCountdown(ms){
  if(ms<=0)return null;
  const tot=Math.floor(ms/1000);
  const h=Math.floor(tot/3600);
  const m=Math.floor((tot%3600)/60);
  const s=tot%60;
  if(h>0)return `${h}h ${m.toString().padStart(2,'0')}m`;
  if(m>0)return `${m}m ${s.toString().padStart(2,'0')}s`;
  return `${s}s`;
}

// ═══════════════════════════════════════
// NOTIFICATIONS
// ═══════════════════════════════════════
async function toggleNotifs(){
  if(!('Notification' in window)){alert('Notifications not supported in this browser.');return;}
  if(!notifsOn){
    const p=await Notification.requestPermission();
    if(p==='granted'){
      notifsOn=true;
      document.getElementById('notifBtn').textContent='🔔 Alerts On';
      document.getElementById('notifBtn').classList.add('on');
    } else {
      alert('Please allow notifications in your browser settings to receive set alerts.');
    }
  } else {
    notifsOn=false;
    document.getElementById('notifBtn').textContent='🔕 Alerts Off';
    document.getElementById('notifBtn').classList.remove('on');
  }
}

function checkNotifs(){
  if(!notifsOn)return;
  const now=new Date();
  SETS.forEach(s=>{
    if(alerted.has(s.id))return;
    const dt=getSetDate(s);
    const minsUntil=(dt-now)/60000;
    if(minsUntil>0&&minsUntil<=alertMinutes){
      alerted.add(s.id);
      const stage=getStage(s.stage);
      new Notification(`${stage.icon} Starting in ~${Math.ceil(minsUntil)} min`,{
        body:`${s.artist}\n${getStageName(s.stage,s.day)}  ·  ${fmt12(s.time)}`,
      });
    }
  });
}

function setDay(day){
  currentDay=day;

    t.classList.toggle('active', day==='fav'?i===3:i===day);

  document.querySelectorAll('.s-chip').forEach(c=>c.classList.remove('active'));
  const all=document.querySelector('[data-s="all"]');
  if(all){styleChipActive(all,'all');all.classList.add('active');}
  render();
}

function setStage(stageId){
  currentStage=stageId;
  document.querySelectorAll('.s-chip').forEach(c=>{
    const active=c.getAttribute('data-s')===stageId;
    c.classList.toggle('active',active);
    if(active) styleChipActive(c,stageId);
    else resetChip(c);
  });
  render();
}

function styleChipActive(el,stageId){
  if(stageId==='all'){
    el.style.cssText='background:rgba(201,74,255,.15);border-color:#c94aff;color:#c94aff';
  } else {
    const s=getStage(stageId);
    if(s) el.style.cssText=`background:${s.color}22;border-color:${s.color};color:${s.color}`;
  }
}
function resetChip(el){el.style.cssText='';}

function toggleFav(id,e){
  e&&e.stopPropagation();
  if(favs.has(id))favs.delete(id);else favs.add(id);
  saveFavs();
  render();
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function render(){
  const now=new Date();
  const grid=document.getElementById('grid');
  const empty=document.getElementById('empty');
  const banner=document.getElementById('nowBanner');

  // Filter sets
  let sets;
  if(currentDay==='fav'){
    sets=SETS.filter(s=>favs.has(s.id)).sort((a,b)=>{
      if(a.day!==b.day)return a.day-b.day;
      return a.time.localeCompare(b.time);
    });
  } else {
    sets=SETS
      .filter(s=>s.day===currentDay&&(currentStage==='all'||s.stage===currentStage))
      .sort((a,b)=>a.time.localeCompare(b.time));
  }

  // Now-playing banner (all days)
  const nowPlaying=SETS.filter(s=>{
    const start=getSetDate(s);
    const end=new Date(start.getTime()+75*60000);
    return now>=start&&now<end;
  });
  if(nowPlaying.length){
    banner.style.display='flex';
    banner.innerHTML=`<div class="live-dot"></div><span class="live-tag">LIVE NOW</span>`
      +nowPlaying.map(s=>{
        const st=getStage(s.stage);
        return `<span style="color:${st.color};font-weight:700">${s.artist}</span>`
          +`<span style="color:var(--muted);font-size:.75rem"> @ ${getStageName(s.stage,s.day)}</span>`;
      }).join('<span style="color:var(--muted);margin:0 5px">·</span>');
  } else {
    banner.style.display='none';
  }

  if(!sets.length){
    grid.innerHTML='';
    empty.style.display='block';
    empty.innerHTML=currentDay==='fav'
      ?'<span class="icon">⭐</span><p>No favorites yet — tap ☆ on any set to save it here.</p>'
      :'<span class="icon">🎵</span><p>No sets match this filter.</p>';
    return;
  }
  empty.style.display='none';

  // Build HTML
  let html='';
  if(currentDay==='fav'){
    grid.classList.add('tl-mode');
    html=renderTimeline(sets);
  } else {
    grid.classList.remove('tl-mode');
  }

  if(currentDay!=='fav' && currentStage==='all'){
    // Group by stage
    const byStage={};
    sets.forEach(s=>{if(!byStage[s.stage])byStage[s.stage]=[];byStage[s.stage].push(s);});
    STAGES.forEach(st=>{
      if(!byStage[st.id])return;
      const sName=getStageName(st.id,currentDay);
      html+=`<div class="stage-header"><div class="stage-header-line" style="background:${st.color}33"></div><div class="stage-header-text" style="color:${st.color}">${st.icon} ${sName}</div><div class="stage-header-line" style="background:${st.color}33"></div></div>`;
      byStage[st.id].forEach(s=>html+=cardHTML(s,now));
    });
  } else if(currentDay!=='fav'){
    sets.forEach(s=>html+=cardHTML(s,now));
  }

  grid.innerHTML=html;
}

// ═══════════════════════════════════════
// TIMELINE RENDERER
// ═══════════════════════════════════════
function renderTimeline(sets){
  if(!sets.length) return `<div class="tl-empty"><span class="icon">⭐</span><p>Tap any artist card to add them to your schedule.</p></div>`;

  const NOON=720, SPAN=720; // 12:00 → 00:00 = 720 mins

  function toMins(t){
    const[h,m]=t.split(':').map(Number);
    let v=h*60+m;
    if(v<NOON)v+=1440; // past midnight
    return v;
  }
  function pct(m){return Math.max(0,Math.min(99,(m-NOON)/SPAN*100));}

  // Build hour ruler (12p … 12a = 13 ticks, 12 cells)
  const hourLabels=['12p','1p','2p','3p','4p','5p','6p','7p','8p','9p','10p','11p','12a'];
  const rulerHTML=hourLabels.map(l=>`<div class="tl-tick">${l}</div>`).join('');
  // Grid lines (one per hour cell)
  const gridLines=Array(12).fill('<div class="tl-grid-line"></div>').join('');

  // Group by day
  const byDay={0:[],1:[],2:[]};
  sets.forEach(s=>byDay[s.day].push(s));

  let html='<div class="tl-hint">Tap a bar to remove it from your schedule</div>';

  [0,1,2].forEach(day=>{
    const daySets=byDay[day];
    if(!daySets.length)return;

    // Clash detection
    const clashIds=new Set();
    const clashPairs=[];
    for(let i=0;i<daySets.length;i++){
      for(let j=i+1;j<daySets.length;j++){
        const a=daySets[i],b=daySets[j];
        const as=toMins(a.time),ae=as+75;
        const bs=toMins(b.time),be=bs+75;
        if(as<be&&ae>bs){
          clashIds.add(a.id);clashIds.add(b.id);
          clashPairs.push([a,b]);
        }
      }
    }

    html+=`<div class="tl-section">`;
    html+=`<div class="tl-day-hdr">${DAY_LABELS[day]}${clashPairs.length?` <span style="color:#ff6666;font-size:.68rem;font-weight:700;letter-spacing:0">⚠️ ${clashPairs.length} clash${clashPairs.length>1?'es':''}</span>`:'&nbsp;✅ No clashes'}</div>`;
    html+=`<div class="tl-scroll"><div class="tl-inner">`;
    html+=`<div class="tl-ruler">${rulerHTML}</div>`;

    // One row per stage that has sets this day
    STAGES.forEach(stage=>{
      const stageSets=daySets.filter(s=>s.stage===stage.id);
      if(!stageSets.length)return;
      const sName=getStageName(stage.id,day);
      let barsHTML=`<div class="tl-grid-lines">${gridLines}</div>`;
      stageSets.forEach(s=>{
        const left=pct(toMins(s.time));
        const width=Math.max(1.5,75/SPAN*100);
        const isClash=clashIds.has(s.id);
        barsHTML+=`<div class="tl-bar${isClash?' clash':''}"
          style="left:${left.toFixed(2)}%;width:${width.toFixed(2)}%;background:${stage.color}"
          data-tl-fav-id="${s.id}"
          title="${s.artist} · ${fmt12(s.time)} · tap to remove">
          ${s.artist}
        </div>`;
      });
      html+=`<div class="tl-row">
        <div class="tl-lbl">${stage.icon} ${sName}</div>
        <div class="tl-bars">${barsHTML}</div>
      </div>`;
    });

    html+=`</div></div>`; // tl-inner, tl-scroll

    // Clash warning list
    if(clashPairs.length){
      html+=`<div class="clash-box">`;
      clashPairs.forEach(([a,b])=>{
        const stA=getStage(a.stage),stB=getStage(b.stage);
        html+=`<div class="clash-item">
          <span class="clash-icon">⚠️</span>
          <span>
            <span style="color:${stA.color};font-weight:700">${a.artist}</span>
            <span style="color:var(--muted)"> (${fmt12(a.time)}) </span>
            clashes with
            <span style="color:${stB.color};font-weight:700"> ${b.artist}</span>
            <span style="color:var(--muted)"> (${fmt12(b.time)})</span>
          </span>
        </div>`;
      });
      html+=`</div>`;
    }

    html+=`</div>`; // tl-section
  });

  return html;
}

function cardHTML(s,now){
  const st=getStage(s.stage);
  const stageName=getStageName(s.stage,s.day);
  const startDt=getSetDate(s);
  const endDt=new Date(startDt.getTime()+75*60000);
  const msUntil=startDt-now;
  const isNow=now>=startDt&&now<endDt;
  const isPast=now>=endDt;
  const isFav=favs.has(s.id);

  let cdHTML='';
  if(isPast){
    cdHTML=`<span class="cd-val ended">Ended</span>`;
  } else if(isNow){
    const mLeft=Math.ceil((endDt-now)/60000);
    cdHTML=`<span class="cd-val live">🟢 LIVE · ~${mLeft}m left</span>`;
  } else {
    const mins=msUntil/60000;
    const cd=fmtCountdown(msUntil);
    let cls='cd-val'+(mins<=5?' urgent':mins<=30?' soon':'');
    cdHTML=`<span class="cd-label">Starts in</span><span class="${cls}" data-sid="${s.id}">${cd}</span>`;
  }

  const cls=['set-card',isNow?'now':'',isPast?'past':'',isFav?'faved':''].filter(Boolean).join(' ');
  return `<div class="${cls}" style="--sc:${st.color}">
    <div class="card-top">
      <div class="artist">${s.artist}</div>
      <button class="fav-btn${isFav?' on':''}" data-fav-id="${s.id}" title="${isFav?'Remove from My Schedule':'Add to My Schedule'}">${isFav?'⭐':'☆'}</button>
    </div>
    <div class="card-mid">
      <div class="stage-pill">${st.icon} ${stageName}</div>
      <div class="set-time">${fmt12(s.time)}</div>
    </div>
    <div class="card-bottom">${cdHTML}</div>
  </div>`;
}

let needsFullRender=false;
function tick(){
  checkNotifs();
  const now=new Date();
  let doFull=false;
  document.querySelectorAll('[data-sid]').forEach(el=>{
    const s=SETS.find(x=>x.id===+el.getAttribute('data-sid'));
    if(!s)return;
    const dt=getSetDate(s);
    const ms=dt-now;
    if(ms<=0){doFull=true;return;}
    el.textContent=fmtCountdown(ms);
    const mins=ms/60000;
    el.className='cd-val'+(mins<=5?' urgent':mins<=30?' soon':'');
  });
  if(doFull)render();
}

  const bar=e.target.closest('[data-tl-fav-id]');
  if(bar){
    const id=parseInt(bar.getAttribute('data-tl-fav-id'));
    favs.delete(id);
    saveFavs();
    render(); // re-render timeline
    return;
  }

  // Card tap (day views)
  const card=e.target.closest('.set-card');
  if(!card)return;
  const btn=card.querySelector('[data-fav-id]');
  if(!btn)return;
  const id=parseInt(btn.getAttribute('data-fav-id'));
  if(favs.has(id))favs.delete(id);else favs.add(id);
  saveFavs();
  const on=favs.has(id);
  btn.classList.toggle('on',on);
  btn.textContent=on?'⭐':'☆';
  btn.title=on?'Remove from My Schedule':'Add to My Schedule';
  card.classList.toggle('faved',on);
  if(currentDay==='fav')render();
});
